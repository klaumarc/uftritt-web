name: Build & Deploy zu Plesk (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: {} # erlaubt manuelles Auslösen im GitHub-UI

concurrency:
  group: deploy-plesk
  # NICHT abbrechen: laufenden FTP-Upload zu Ende laufen lassen, sonst bleiben
  # halb hochgeladene/fehlende Dateien zurueck. Neue Pushes warten in der Queue.
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy per FTP auf Plesk
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Plain FTP: Der Plesk/ProFTPD-Server (janus.kreativmedia.ch) bricht bei FTPS
          # die Datenverbindung ab (verlangt TLS-Session-Reuse auf dem Datenkanal, den
          # basic-ftp nicht liefert -> ECONNRESET). Plain FTP laeuft sauber durch.
          # Sicherheits-Haertung spaeter: SFTP oder bei Kreativmedia NoSessionReuseRequired anfragen.
          protocol: ftp
          # Inhalt des Build-Ordners hochladen
          local-dir: ./dist/
          # Zielordner auf dem Hosting. Default httpdocs/ – per Secret überschreibbar,
          # falls dein FTP-Login direkt im Web-Root landet (dann Secret = ./).
          server-dir: ${{ secrets.FTP_SERVER_DIR != '' && secrets.FTP_SERVER_DIR || 'httpdocs/' }}
          # Diagnose: zeigt jeden FTP-Befehl im Log -> sehen, wo die Verbindung abbricht
          log-level: verbose
          # mehr Geduld beim Verbindungsaufbau (Default 30s)
          timeout: 60000
          # INKREMENTELL: kein clean-slate. Die Action fuehrt eine Sync-State-Datei
          # im server-dir und laedt nur geaenderte/neue Dateien hoch; entfernt werden
          # nur Dateien, die im Projekt geloescht wurden. NICHT alles ersetzen (User-Vorgabe).
          # Neuer state-name = einmaliger Voll-Reupload (ergaenzt fehlende Dateien wie
          # /icons/ + sitemap nach abgebrochenem Deploy), loescht dabei NICHTS.
          state-name: .deploy-state.json
