name: Build & Deploy zu Plesk (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: {} # erlaubt manuelles Auslösen im GitHub-UI

concurrency:
  group: deploy-plesk
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy per FTP auf Plesk
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # FTPS (verschlüsselt). Falls dein Server nur einfaches FTP kann: auf "ftp" ändern.
          protocol: ftps
          # Inhalt des Build-Ordners hochladen
          local-dir: ./dist/
          # Zielordner auf dem Hosting. Default httpdocs/ – per Secret überschreibbar,
          # falls dein FTP-Login direkt im Web-Root landet (dann Secret = ./).
          server-dir: ${{ secrets.FTP_SERVER_DIR != '' && secrets.FTP_SERVER_DIR || 'httpdocs/' }}
          # Diagnose: zeigt jeden FTP-Befehl im Log -> sehen, wo die Verbindung abbricht
          log-level: verbose
          # mehr Geduld beim Verbindungsaufbau (Default 30s)
          timeout: 60000
          # ACHTUNG: leert den Zielordner (server-dir) komplett vor dem Upload.
          # Loescht das alte WordPress in ki.uftritt.ch. server-dir MUSS ki.uftritt.ch/ sein!
          dangerous-clean-slate: true
